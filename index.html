<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Call Notes</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Call Notes" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0e0e0f;
      --bg2: #1a1a1c;
      --bg3: #242426;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0efe8;
      --muted: #7a7a72;
      --hint: #4a4a44;
      --accent: #c8f57a;
      --accent-dim: rgba(200,245,122,0.12);
      --danger: #f57a7a;
      --danger-dim: rgba(245,122,122,0.1);
      --blue: #7ab8f5;
      --blue-dim: rgba(122,184,245,0.1);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --font: 'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'SF Mono', 'Fira Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* --- VIEWS --- */
    .view { display: none; flex-direction: column; min-height: 100dvh; }
    .view.active { display: flex; }

    /* --- HEADER --- */
    .header {
      padding: calc(var(--safe-top) + 14px) 18px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    /* --- BUTTONS --- */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      padding: 13px 18px;
      border-radius: 12px;
      border: 0.5px solid var(--border2);
      background: var(--bg2);
      color: var(--text);
      cursor: pointer;
      width: 100%;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-user-select: none;
    }
    .btn:active { opacity: 0.7; transform: scale(0.98); }
    .btn-accent { background: var(--accent-dim); border-color: rgba(200,245,122,0.25); color: var(--accent); }
    .btn-blue { background: var(--blue-dim); border-color: rgba(122,184,245,0.25); color: var(--blue); }
    .btn-danger { background: var(--danger-dim); border-color: rgba(245,122,122,0.2); color: var(--danger); }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 14px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 10px; font-size: 18px; }

    /* --- INPUTS --- */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: rgba(200,245,122,0.4); }
    .field textarea { font-family: var(--mono); font-size: 14px; resize: none; line-height: 1.65; }

    /* --- SCROLL BODY --- */
    .scroll-body { flex: 1; overflow-y: auto; padding: 16px 18px; padding-bottom: calc(var(--safe-bottom) + 100px); }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(14,14,15,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--border);
      padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 500;
      font-family: var(--font);
      gap: 4px;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn .icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }

    /* --- TIMESTAMP --- */
    .ts-bar {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      padding: 8px 0 14px;
    }

    /* --- ROW GRID --- */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* --- ACTION GRID --- */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .action-grid .span2 { grid-column: span 2; }

    /* --- CALL CARDS (LOG) --- */
    .call-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.12s;
    }
    .call-card:active { border-color: var(--border2); }
    .cc-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .cc-preview { font-size: 12px; color: var(--muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .cc-meta { font-size: 11px; color: var(--hint); }
    .cc-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .cc-actions .btn { width: auto; font-size: 13px; padding: 8px 14px; }

    /* --- EMPTY STATE --- */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .empty .e-icon { font-size: 40px; margin-bottom: 12px; }

    /* --- TOAST --- */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 80px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* --- DETAIL VIEW --- */
    .detail-notes {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      min-height: 140px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; margin: 16px 0 6px; }
    .detail-val { font-size: 15px; color: var(--text); }
  </style>
</head>
<body>

<!-- NEW CALL VIEW -->
<div class="view active" id="view-new">
  <div class="header">
    <div>
      <div class="header-title">New call</div>
      <div class="header-sub" id="live-ts"></div>
    </div>
    <button class="btn btn-icon" onclick="clearForm()" title="Clear">✕</button>
  </div>
  <div class="scroll-body">
    <div class="field">
      <label>Name</label>
      <input type="text" id="name" placeholder="Caller name" autocomplete="name" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="(555) 000-0000" autocomplete="tel" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@email.com" autocomplete="email" />
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notes" rows="9" placeholder="Jot your notes here..."></textarea>
    </div>
    <div class="action-grid">
      <button class="btn btn-accent" onclick="sendSMS()">📱 Text it</button>
      <button class="btn btn-blue" onclick="sendEmail()">✉️ Email it</button>
      <button class="btn" onclick="copyNotes()">📋 Copy notes</button>
      <button class="btn" onclick="saveNote()">💾 Save to log</button>
      <button class="btn btn-danger span2" onclick="clearForm()">Clear form</button>
    </div>
  </div>
</div>

<!-- LOG VIEW -->
<div class="view" id="view-log">
  <div class="header">
    <div>
      <div class="header-title">Call log</div>
      <div class="header-sub" id="log-count">0 calls saved</div>
    </div>
  </div>
  <div class="scroll-body" id="log-list">
    <div class="empty"><div class="e-icon">📞</div>No calls saved yet.<br>Fill out a call and tap Save to log.</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-new" onclick="switchView('new')">
    <span class="icon">📝</span>
    <span>New call</span>
  </button>
  <button class="nav-btn" id="nav-log" onclick="switchView('log')">
    <span class="icon">📋</span>
    <span>Log</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  let notes = JSON.parse(localStorage.getItem('call_notes_v1') || '[]');

  function persist() {
    localStorage.setItem('call_notes_v1', JSON.stringify(notes));
  }

  function updateTS() {
    document.getElementById('live-ts').textContent = new Date().toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }
  updateTS();
  setInterval(updateTS, 30000);

  function switchView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.getElementById('nav-' + v).classList.add('active');
    if (v === 'log') renderLog();
  }

  function buildMsg(n) {
    const ts = n ? n.ts : new Date().toLocaleString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const name = n ? n.name : document.getElementById('name').value.trim();
    const body = n ? n.notes : document.getElementById('notes').value.trim();
    let msg = name ? `Call with ${name}\n` : '';
    msg += `${ts}\n\n${body || '(no notes)'}`;
    return msg;
  }

  function sendSMS(n) {
    const phone = n ? n.phone : document.getElementById('phone').value.trim();
    const msg = encodeURIComponent(buildMsg(n || null));
    window.location.href = `sms:${phone || ''}&body=${msg}`;
  }

  function sendEmail(n) {
    const email = n ? n.email : document.getElementById('email').value.trim();
    const name = n ? n.name : document.getElementById('name').value.trim();
    const subject = encodeURIComponent(`Call notes${name ? ' – ' + name : ''}`);
    const body = encodeURIComponent(buildMsg(n || null));
    window.location.href = `mailto:${email || ''}?subject=${subject}&body=${body}`;
  }

  function copyNotes(n) {
    navigator.clipboard.writeText(buildMsg(n || null)).then(() => toast('Copied'));
  }

  function saveNote() {
    const note = {
      id: Date.now(),
      name: document.getElementById('name').value.trim() || 'Unknown caller',
      phone: document.getElementById('phone').value.trim(),
      email: document.getElementById('email').value.trim(),
      notes: document.getElementById('notes').value.trim(),
      ts: new Date().toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})
    };
    notes.unshift(note);
    persist();
    toast('Saved to log');
  }

  function clearForm() {
    ['name','phone','email','notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('name').focus();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    persist();
    renderLog();
    toast('Deleted');
  }

  function loadNote(id) {
    const n = notes.find(x => x.id === id);
    if (!n) return;
    document.getElementById('name').value = n.name;
    document.getElementById('phone').value = n.phone;
    document.getElementById('email').value = n.email;
    document.getElementById('notes').value = n.notes;
    switchView('new');
    toast('Loaded into form');
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    const count = document.getElementById('log-count');
    count.textContent = `${notes.length} call${notes.length !== 1 ? 's' : ''} saved`;
    if (!notes.length) {
      list.innerHTML = '<div class="empty"><div class="e-icon">📞</div>No calls saved yet.<br>Fill out a call and tap Save to log.</div>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="call-card">
        <div class="cc-name">${n.name}</div>
        <div class="cc-preview">${n.notes || 'no notes'}</div>
        <div class="cc-meta">${n.ts}${n.phone ? '  ·  ' + n.phone : ''}</div>
        <div class="cc-actions">
          ${n.phone ? `<button class="btn btn-accent" onclick="sendSMS(notes.find(x=>x.id===${n.id}))">📱 Text</button>` : ''}
          ${n.email ? `<button class="btn btn-blue" onclick="sendEmail(notes.find(x=>x.id===${n.id}))">✉️ Email</button>` : ''}
          <button class="btn" onclick="copyNotes(notes.find(x=>x.id===${n.id}))">📋 Copy</button>
          <button class="btn" onclick="loadNote(${n.id})">Load</button>
          <button class="btn btn-danger" onclick="deleteNote(${n.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
